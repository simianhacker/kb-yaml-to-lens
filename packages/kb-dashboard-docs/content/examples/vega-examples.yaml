      # Horizontal Bar Chart
      # To query Elasticsearch instead of inline data, replace the data section:
      #   data:
      #     url:
      #       '%context%': true
      #       '%timefield%': '@timestamp'
      #       index: logs-*
      #       body:
      #         size: 0
      #         aggs:
      #           endpoints:
      #             terms:
      #               field: url.path
      #               size: 10
      #   format:
      #     property: aggregations.endpoints.buckets
      # Then use field names: key (nominal), doc_count (quantitative)
      - title: Top Endpoints by Request Count
        description: Horizontal bar chart showing top 10 endpoints
        size:
          w: 24
          h: 15
        position:
          x: 24
          y: 31
        vega:
          spec:
            $schema: https://vega.github.io/schema/vega-lite/v5.json
            data:
              values:
                - endpoint: /api/users
                  requests: 12450
                - endpoint: /api/orders
                  requests: 8920
                - endpoint: /api/products
                  requests: 7650
                - endpoint: /api/auth/login
                  requests: 5430
                - endpoint: /api/search
                  requests: 4280
                - endpoint: /api/checkout
                  requests: 3150
                - endpoint: /api/cart
                  requests: 2890
                - endpoint: /api/inventory
                  requests: 1920
                - endpoint: /api/notifications
                  requests: 1540
                - endpoint: /api/settings
                  requests: 980
            mark: bar
            encoding:
              y:
                field: endpoint
                type: nominal
                title: Endpoint
                sort: -x
              x:
                field: requests
                type: quantitative
                title: Request Count

      # Scatter Plot
      # To query Elasticsearch instead of inline data, replace the data section:
      #   data:
      #     url:
      #       '%context%': true
      #       '%timefield%': '@timestamp'
      #       index: logs-*
      #       body:
      #         size: 500
      #         _source:
      #           - http.response.body.bytes
      #           - event.duration
      #           - service.name
      #   format:
      #     property: hits.hits
      #   transform:
      #     - calculate: datum._source['http.response.body.bytes']
      #       as: bytes
      #     - calculate: datum._source['event.duration'] / 1000000
      #       as: duration_ms
      #     - calculate: datum._source['service.name']
      #       as: service
      - title: Response Time vs Payload Size
        description: Scatter plot comparing metrics
        size:
          w: 24
          h: 15
        position:
          x: 0
          y: 46
        vega:
          spec:
            $schema: https://vega.github.io/schema/vega-lite/v5.json
            data:
              values:
                - bytes: 1024
                  duration_ms: 45
                  service: api-gateway
                - bytes: 2048
                  duration_ms: 62
                  service: api-gateway
                - bytes: 512
                  duration_ms: 28
                  service: api-gateway
                - bytes: 4096
                  duration_ms: 95
                  service: api-gateway
                - bytes: 8192
                  duration_ms: 180
                  service: api-gateway
                - bytes: 3072
                  duration_ms: 75
                  service: user-service
                - bytes: 1536
                  duration_ms: 52
                  service: user-service
                - bytes: 768
                  duration_ms: 35
                  service: user-service
                - bytes: 6144
                  duration_ms: 142
                  service: user-service
                - bytes: 2560
                  duration_ms: 68
                  service: user-service
                - bytes: 10240
                  duration_ms: 220
                  service: order-service
                - bytes: 5120
                  duration_ms: 115
                  service: order-service
                - bytes: 15360
                  duration_ms: 310
                  service: order-service
                - bytes: 7680
                  duration_ms: 165
                  service: order-service
                - bytes: 12288
                  duration_ms: 255
                  service: order-service
            mark:
              type: circle
              opacity: 0.6
            encoding:
              x:
                field: bytes
                type: quantitative
                title: Response Size (bytes)
              y:
                field: duration_ms
                type: quantitative
                title: Duration (ms)
              color:
                field: service
                type: nominal
                title: Service

      # Pie Chart
      # To query Elasticsearch instead of inline data, replace the data section:
      #   data:
      #     url:
      #       '%context%': true
      #       '%timefield%': '@timestamp'
      #       index: logs-*
      #       body:
      #         size: 0
      #         aggs:
      #           status_codes:
      #             terms:
      #               field: http.response.status_code
      #               size: 10
      #   format:
      #     property: aggregations.status_codes.buckets
      # Then use field names: key (nominal), doc_count (quantitative)
      - title: Request Distribution by Status
        description: Pie chart showing HTTP status code distribution
        size:
          w: 24
          h: 15
        position:
          x: 24
          y: 46
        vega:
          spec:
            $schema: https://vega.github.io/schema/vega-lite/v5.json
            data:
              values:
                - status: '200'
                  count: 45200
                - status: '201'
                  count: 8350
                - status: '204'
                  count: 3120
                - status: '301'
                  count: 1250
                - status: '304'
                  count: 2840
                - status: '400'
                  count: 890
                - status: '401'
                  count: 420
                - status: '404'
                  count: 1560
                - status: '500'
                  count: 280
                - status: '503'
                  count: 95
            mark:
              type: arc
              innerRadius: 50
            encoding:
              theta:
                field: count
                type: quantitative
              color:
                field: status
                type: nominal
                title: Status Code

      # Sankey Diagram - Full Vega (not Vega-Lite)
      # To query Elasticsearch for service-to-service traffic, you could use:
      #   - name: links
      #     url:
      #       '%context%': true
      #       '%timefield%': '@timestamp'
      #       index: traces-*
      #       body:
      #         size: 0
      #         aggs:
      #           sources:
      #             terms:
      #               field: service.name
      #               size: 20
      #             aggs:
      #               targets:
      #                 terms:
      #                   field: destination.service.name
      #                   size: 20
      #     format:
      #       property: aggregations.sources.buckets
      #     transform:
      #       - type: flatten
      #         fields: [targets.buckets]
      #         as: [target]
      #       - type: formula
      #         as: source
      #         expr: datum.key
      #       - type: formula
      #         as: targetName
      #         expr: datum.target.key
      #       - type: formula
      #         as: value
      #         expr: datum.target.doc_count
      # Note: Sankey requires computing node positions from the data, which adds complexity.
      # The inline example below uses pre-computed positions for simplicity.
      - title: Request Flow Through Services
        description: Sankey diagram showing traffic flow between services
        size:
          w: 48
          h: 20
        position:
          x: 0
          y: 61
        vega:
          spec:
            $schema: https://vega.github.io/schema/vega/v5.json
            autosize: none
            width: 800
            height: 350
            padding: 10
            data:
              - name: nodes
                values:
                  - id: lb
                    name: Load Balancer
                    x: 50
                    y: 150
                  - id: api
                    name: API Gateway
                    x: 200
                    y: 150
                  - id: auth
                    name: Auth Service
                    x: 350
                    y: 50
                  - id: user
                    name: User Service
                    x: 350
                    y: 150
                  - id: order
                    name: Order Service
                    x: 350
                    y: 250
                  - id: session
                    name: Session Cache
                    x: 500
                    y: 30
                  - id: cache
                    name: Cache
                    x: 500
                    y: 100
                  - id: db
                    name: Database
                    x: 500
                    y: 180
                  - id: payment
                    name: Payment
                    x: 500
                    y: 260
                  - id: external
                    name: External API
                    x: 650
                    y: 260
              - name: links
                values:
                  - source: lb
                    target: api
                    value: 45000
                    sx: 90
                    sy: 170
                    tx: 200
                    ty: 170
                  - source: api
                    target: auth
                    value: 12000
                    sx: 240
                    sy: 150
                    tx: 350
                    ty: 70
                  - source: api
                    target: user
                    value: 18000
                    sx: 240
                    sy: 170
                    tx: 350
                    ty: 170
                  - source: api
                    target: order
                    value: 15000
                    sx: 240
                    sy: 190
                    tx: 350
                    ty: 270
                  - source: auth
                    target: session
                    value: 4000
                    sx: 390
                    sy: 60
                    tx: 500
                    ty: 50
                  - source: auth
                    target: cache
                    value: 8000
                    sx: 390
                    sy: 80
                    tx: 500
                    ty: 120
                  - source: user
                    target: cache
                    value: 6000
                    sx: 390
                    sy: 160
                    tx: 500
                    ty: 130
                  - source: user
                    target: db
                    value: 20000
                    sx: 390
                    sy: 180
                    tx: 500
                    ty: 200
                  - source: order
                    target: db
                    value: 10000
                    sx: 390
                    sy: 260
                    tx: 500
                    ty: 210
                  - source: order
                    target: payment
                    value: 5000
                    sx: 390
                    sy: 280
                    tx: 500
                    ty: 280
                  - source: payment
                    target: external
                    value: 5000
                    sx: 540
                    sy: 280
                    tx: 650
                    ty: 280
            scales:
              - name: color
                type: ordinal
                domain:
                  data: nodes
                  field: name
                range: category
            marks:
              - type: path
                from:
                  data: links
                encode:
                  enter:
                    stroke:
                      value: '#6baed6'
                    strokeWidth:
                      signal: max(datum.value / 3000, 3)
                    strokeOpacity:
                      value: 0.6
                    path:
                      signal: "'M' + datum.sx + ',' + datum.sy + ' C' + (datum.sx + 50) + ',' + datum.sy + ' ' + (datum.tx - 50) + ',' + datum.ty + ' ' + datum.tx + ',' + datum.ty"
              - type: rect
                from:
                  data: nodes
                encode:
                  enter:
                    x:
                      field: x
                    y:
                      field: y
                    width:
                      value: 40
                    height:
                      value: 40
                    fill:
                      scale: color
                      field: name
                    cornerRadius:
                      value: 6
                    stroke:
                      value: '#fff'
                    strokeWidth:
                      value: 2
                  update:
                    tooltip:
                      field: name
              - type: text
                from:
                  data: nodes
                encode:
                  enter:
                    x:
                      signal: datum.x + 20
                    y:
                      signal: datum.y - 8
                    text:
                      field: name
                    fontSize:
                      value: 11
                    fontWeight:
                      value: bold
                    align:
                      value: center
                    fill:
                      value: '#333'
