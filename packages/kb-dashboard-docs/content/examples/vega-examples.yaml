---
dashboards:
  - id: vega-examples-001
    name: '[Example] Vega Visualizations'
    description: Comprehensive examples of Vega and Vega-Lite custom visualization configurations
    panels:
      - title: Vega Examples Overview
        size:
          w: 48
          h: 6
        position:
          x: 0
          y: 0
        markdown:
          content: |
            # Vega Visualization Examples
            This dashboard demonstrates various Vega and Vega-Lite configurations:
            - **Hello Vega** - Minimal static visualization
            - **Bar Charts** - Vertical and horizontal bar charts
            - **Time Series** - Line and area charts with temporal data
            - **Multi-Series** - Multiple lines with color encoding
            - **Scatter Plots** - Comparing two quantitative dimensions
            - **Pie/Donut Charts** - Arc marks for proportional data
            - **Sankey Diagram** - Flow visualization between services
            Vega panels are perfect for custom visualizations not available in Lens.

      # Minimal Hello Vega
      - title: Hello Vega
        description: A minimal Vega visualization showing static text
        size:
          w: 24
          h: 10
        position:
          x: 0
          y: 6
        vega:
          spec:
            $schema: https://vega.github.io/schema/vega/v3.json
            autosize: none
            width: 300
            height: 100
            marks:
              - type: text
                encode:
                  enter:
                    x:
                      value: 150
                    y:
                      value: 50
                    text:
                      value: Hello Vega!
                    fontSize:
                      value: 24
                    align:
                      value: center
                    fill:
                      value: '#1a1a1a'

      # Vega-Lite Bar Chart
      - title: Simple Bar Chart (Vega-Lite)
        description: Bar chart using Vega-Lite with inline data
        size:
          w: 24
          h: 10
        position:
          x: 24
          y: 6
        vega:
          spec:
            $schema: https://vega.github.io/schema/vega-lite/v5.json
            description: A simple bar chart with inline data
            data:
              values:
                - category: A
                  amount: 28
                - category: B
                  amount: 55
                - category: C
                  amount: 43
                - category: D
                  amount: 91
                - category: E
                  amount: 81
            mark: bar
            encoding:
              x:
                field: category
                type: nominal
                axis:
                  labelAngle: 0
              y:
                field: amount
                type: quantitative

      # Time Series Example
      # To query Elasticsearch instead of inline data, replace the data section:
      #   data:
      #     url:
      #       '%context%': true
      #       '%timefield%': '@timestamp'
      #       index: logs-*
      #       body:
      #         size: 0
      #         aggs:
      #           time_buckets:
      #             date_histogram:
      #               field: '@timestamp'
      #               fixed_interval: 1h
      #   format:
      #     property: aggregations.time_buckets.buckets
      # Then use field names: key (temporal), doc_count (quantitative)
      - title: Time Series Line Chart
        description: Line chart with temporal x-axis using inline data
        size:
          w: 24
          h: 15
        position:
          x: 0
          y: 16
        vega:
          spec:
            $schema: https://vega.github.io/schema/vega-lite/v5.json
            data:
              values:
                - time: '2024-01-01T00:00:00'
                  count: 120
                - time: '2024-01-01T01:00:00'
                  count: 85
                - time: '2024-01-01T02:00:00'
                  count: 45
                - time: '2024-01-01T03:00:00'
                  count: 30
                - time: '2024-01-01T04:00:00'
                  count: 25
                - time: '2024-01-01T05:00:00'
                  count: 40
                - time: '2024-01-01T06:00:00'
                  count: 95
                - time: '2024-01-01T07:00:00'
                  count: 180
                - time: '2024-01-01T08:00:00'
                  count: 250
                - time: '2024-01-01T09:00:00'
                  count: 310
                - time: '2024-01-01T10:00:00'
                  count: 285
                - time: '2024-01-01T11:00:00'
                  count: 320
            mark: line
            encoding:
              x:
                field: time
                type: temporal
                title: Time
              y:
                field: count
                type: quantitative
                title: Event Count

      # Multi-Series Line Chart
      # To query Elasticsearch instead of inline data, replace the data section:
      #   data:
      #     url:
      #       '%context%': true
      #       '%timefield%': '@timestamp'
      #       index: logs-*
      #       body:
      #         size: 0
      #         aggs:
      #           services:
      #             terms:
      #               field: service.name
      #               size: 5
      #             aggs:
      #               over_time:
      #                 date_histogram:
      #                   field: '@timestamp'
      #                   fixed_interval: 1h
      #   transform:
      #     - flatten:
      #         - buckets
      #       as:
      #         - time_bucket
      #   format:
      #     property: aggregations.services.buckets
      # Then use field names: time_bucket.key (temporal), time_bucket.doc_count (quantitative), key (nominal for color)
      - title: Multi-Series by Service
        description: Multiple lines showing trends per service
        size:
          w: 24
          h: 15
        position:
          x: 24
          y: 16
        vega:
          spec:
            $schema: https://vega.github.io/schema/vega-lite/v5.json
            data:
              values:
                - time: '2024-01-01T00:00:00'
                  count: 120
                  service: api-gateway
                - time: '2024-01-01T01:00:00'
                  count: 85
                  service: api-gateway
                - time: '2024-01-01T02:00:00'
                  count: 45
                  service: api-gateway
                - time: '2024-01-01T03:00:00'
                  count: 55
                  service: api-gateway
                - time: '2024-01-01T04:00:00'
                  count: 90
                  service: api-gateway
                - time: '2024-01-01T05:00:00'
                  count: 150
                  service: api-gateway
                - time: '2024-01-01T00:00:00'
                  count: 80
                  service: user-service
                - time: '2024-01-01T01:00:00'
                  count: 60
                  service: user-service
                - time: '2024-01-01T02:00:00'
                  count: 30
                  service: user-service
                - time: '2024-01-01T03:00:00'
                  count: 25
                  service: user-service
                - time: '2024-01-01T04:00:00'
                  count: 45
                  service: user-service
                - time: '2024-01-01T05:00:00'
                  count: 95
                  service: user-service
                - time: '2024-01-01T00:00:00'
                  count: 200
                  service: order-service
                - time: '2024-01-01T01:00:00'
                  count: 150
                  service: order-service
                - time: '2024-01-01T02:00:00'
                  count: 80
                  service: order-service
                - time: '2024-01-01T03:00:00'
                  count: 60
                  service: order-service
                - time: '2024-01-01T04:00:00'
                  count: 110
                  service: order-service
                - time: '2024-01-01T05:00:00'
                  count: 180
                  service: order-service
            mark: line
            encoding:
              x:
                field: time
                type: temporal
                title: Time
              y:
                field: count
                type: quantitative
                title: Count
              color:
                field: service
                type: nominal
                title: Service

      # Area Chart with Gradient
