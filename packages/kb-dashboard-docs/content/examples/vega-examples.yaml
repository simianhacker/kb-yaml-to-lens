      #     url:
      #       '%context%': true
      #       '%timefield%': '@timestamp'
      #       index: logs-*
      #       body:
      #         size: 0
      #         aggs:
      #           time_buckets:
      #             date_histogram:
      #               field: '@timestamp'
      #               fixed_interval: 30m
      #   format:
      #     property: aggregations.time_buckets.buckets
      # Then use field names: key (temporal), doc_count (quantitative)
