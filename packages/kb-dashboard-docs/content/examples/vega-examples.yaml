                - time: '2024-01-01T00:00:00'
                  volume: 1200
                - time: '2024-01-01T00:30:00'
                  volume: 1100
                - time: '2024-01-01T01:00:00'
                  volume: 850
                - time: '2024-01-01T01:30:00'
                  volume: 620
                - time: '2024-01-01T02:00:00'
                  volume: 450
                - time: '2024-01-01T02:30:00'
                  volume: 380
                - time: '2024-01-01T03:00:00'
                  volume: 300
                - time: '2024-01-01T03:30:00'
                  volume: 280
                - time: '2024-01-01T04:00:00'
                  volume: 350
                - time: '2024-01-01T04:30:00'
                  volume: 520
                - time: '2024-01-01T05:00:00'
                  volume: 780
                - time: '2024-01-01T05:30:00'
                  volume: 1150
                - time: '2024-01-01T06:00:00'
